<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Finder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; background: linear-gradient(180deg, #eef2ff 0%, #e0e7ff 30%, #f5f3ff 100%); }

  header { padding: 40px 16px 24px; text-align: center; }
  header h1 { font-size: 2.25rem; font-weight: 800; color: #1f2937; margin-bottom: 4px; }
  header p { color: #6b7280; }

  .search-row { max-width: 48rem; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 10px; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap span.icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.25rem; pointer-events: none; }
  .search-wrap input { width: 100%; padding: 16px 48px; border-radius: 16px; border: none; outline: none; background: #fff; box-shadow: 0 4px 6px -1px rgb(0 0 0/.07); font-size: 1rem; color: #374151; }
  .search-wrap input:focus { box-shadow: 0 0 0 2px #818cf8, 0 4px 6px -1px rgb(0 0 0/.07); }
  .search-wrap .clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; font-size: 1.1rem; cursor: pointer; }
  .search-wrap .clear:hover { color: #4b5563; }
  .add-btn { padding: 16px 24px; border-radius: 16px; background: #6366f1; color: #fff; font-weight: 600; font-size: .95rem; border: none; cursor: pointer; box-shadow: 0 4px 6px rgb(0 0 0/.12); transition: all .2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .add-btn:hover { background: #4f46e5; box-shadow: 0 10px 15px rgb(0 0 0/.15); }
  .add-btn:active { transform: scale(.95); }

  .filters { max-width: 48rem; margin: 0 auto 32px; padding: 0 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
  .filter-btn { padding: 8px 16px; border-radius: 9999px; font-size: .875rem; font-weight: 500; border: none; cursor: pointer; transition: all .2s; background: #fff; color: #4b5563; box-shadow: 0 1px 3px rgb(0 0 0/.1); }
  .filter-btn:hover { box-shadow: 0 4px 6px rgb(0 0 0/.1); }
  .filter-btn.active-diet { background: #6366f1; color: #fff; box-shadow: 0 4px 6px rgb(0 0 0/.15); transform: scale(1.05); }
  .filter-btn.active-fav { background: #f43f5e; color: #fff; box-shadow: 0 4px 6px rgb(0 0 0/.15); transform: scale(1.05); }
  .filter-btn:hover:not(.active-diet):not(.active-fav) { background: #eef2ff; }
  .filter-btn.fav-hover:hover:not(.active-fav) { background: #fff1f2; }
  .filter-btn.clear-btn { background: transparent; color: #ef4444; box-shadow: none; }
  .filter-btn.clear-btn:hover { background: #fef2f2; }
  .divider { width: 1px; height: 32px; background: #d1d5db; }

  .count { max-width: 72rem; margin: 0 auto; padding: 0 16px 24px; font-size: .875rem; color: #6b7280; }
  .grid { max-width: 72rem; margin: 0 auto; padding: 0 16px 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }

  .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0/.07); cursor: pointer; transition: all .3s; position: relative; animation: cardIn .35s ease-out both; }
  .card:hover { box-shadow: 0 10px 25px -5px rgb(0 0 0/.12); transform: translateY(-4px); }
  .card-img { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; background: linear-gradient(135deg, #e0e7ff, #ddd6fe); }
  .card:hover .card-img span { transform: scale(1.1); }
  .card-img span { transition: transform .3s; display: inline-block; }
  .card-body { padding: 16px; }
  .card-body h3 { font-weight: 700; font-size: 1.125rem; color: #1f2937; margin-bottom: 8px; line-height: 1.3; }
  .card-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .card-meta .time { font-size: .875rem; color: #6b7280; }
  .badge { font-size: .75rem; font-weight: 500; padding: 2px 8px; border-radius: 9999px; }
  .badge-easy { background: #d1fae5; color: #065f46; }
  .badge-medium { background: #fef3c7; color: #92400e; }
  .badge-hard { background: #fee2e2; color: #991b1b; }
  .tag { font-size: .75rem; padding: 2px 8px; border-radius: 9999px; background: #f5f3ff; color: #6d28d9; display: inline-block; margin: 0 4px 4px 0; }

  .heart-btn { position: absolute; top: 12px; right: 12px; z-index: 5; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.8); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgb(0 0 0/.15); transition: all .2s; }
  .heart-btn:hover { background: #fff; transform: scale(1.1); }
  .heart-btn svg { width: 20px; height: 20px; }

  .custom-badge { position: absolute; top: 12px; left: 12px; z-index: 5; padding: 2px 10px; border-radius: 9999px; background: #6366f1; color: #fff; font-size: .7rem; font-weight: 600; letter-spacing: .03em; }
  .delete-btn { position: absolute; top: 12px; left: 12px; z-index: 5; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,.85); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .85rem; font-weight: 700; box-shadow: 0 1px 3px rgb(0 0 0/.2); transition: all .2s; }
  .delete-btn:hover { background: #dc2626; transform: scale(1.1); }

  .empty { text-align: center; padding: 64px 16px; }
  .empty .eicon { font-size: 3rem; margin-bottom: 16px; }
  .empty p { color: #6b7280; font-size: 1.125rem; }
  .empty .sub { color: #9ca3af; font-size: .875rem; margin-top: 4px; }

  .more-wrap { text-align: center; padding-bottom: 48px; }
  .more-btn { padding: 12px 32px; border-radius: 16px; background: #6366f1; color: #fff; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; box-shadow: 0 4px 6px rgb(0 0 0/.12); transition: all .2s; }
  .more-btn:hover { background: #4f46e5; box-shadow: 0 10px 15px rgb(0 0 0/.15); }
  .more-btn:active { transform: scale(.95); }

  /* Modal & Form overlay shared */
  .overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); }
  .modal { position: relative; background: #fff; border-radius: 24px; max-width: 32rem; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgb(0 0 0/.25); animation: modalIn .25s ease-out; }
  .modal-img { height: 176px; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: linear-gradient(135deg, #e0e7ff, #ddd6fe); }
  .modal-close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.8); border: none; cursor: pointer; font-size: 1.25rem; color: #4b5563; box-shadow: 0 1px 3px rgb(0 0 0/.15); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: #fff; }
  .modal-heart { position: absolute; top: 12px; right: 56px; }
  .modal-body { padding: 24px; }
  .modal-body h2 { font-size: 1.5rem; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
  .modal-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h4, .form-panel h4 { font-weight: 600; color: #374151; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .ingredient-chip { display: inline-block; padding: 4px 12px; border-radius: 9999px; background: #eff6ff; color: #1e40af; font-size: .875rem; border: 1px solid #bfdbfe; margin: 0 8px 8px 0; }
  .modal-body .instructions { color: #4b5563; line-height: 1.7; font-size: .875rem; }

  /* Form */
  .form-panel { padding: 24px; }
  .form-panel h2 { font-size: 1.35rem; font-weight: 700; color: #1f2937; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .8rem; font-weight: 600; color: #374151; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid #d1d5db; outline: none; font-size: .9rem; color: #374151; font-family: inherit; background: #fff; transition: border .2s; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,.25); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group .hint { font-size: .75rem; color: #9ca3af; margin-top: 4px; }
  .emoji-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .emoji-opt { width: 40px; height: 40px; border-radius: 10px; border: 2px solid #e5e7eb; background: #fff; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .emoji-opt:hover { border-color: #a5b4fc; background: #eef2ff; }
  .emoji-opt.selected { border-color: #6366f1; background: #e0e7ff; transform: scale(1.1); }
  .tag-toggles { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-toggle { padding: 6px 14px; border-radius: 9999px; border: 1px solid #d1d5db; background: #fff; font-size: .8rem; cursor: pointer; transition: all .15s; color: #4b5563; }
  .tag-toggle:hover { border-color: #a5b4fc; }
  .tag-toggle.on { background: #6366f1; color: #fff; border-color: #6366f1; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .form-actions button { flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; font-size: .95rem; cursor: pointer; border: none; transition: all .2s; }
  .btn-cancel { background: #f3f4f6; color: #4b5563; }
  .btn-cancel:hover { background: #e5e7eb; }
  .btn-save { background: #6366f1; color: #fff; box-shadow: 0 4px 6px rgb(0 0 0/.12); }
  .btn-save:hover { background: #4f46e5; }
  .btn-save:active { transform: scale(.97); }
  .form-error { color: #ef4444; font-size: .8rem; margin-top: 4px; display: none; }

  @keyframes cardIn { from { opacity: 0; transform: scale(.93) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes modalIn { from { opacity: 0; transform: scale(.93) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>🍽️ Recipe Finder</h1>
  <p>Search by ingredients you have on hand</p>
</header>

<div class="search-row">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Enter ingredients, e.g. chicken, garlic, lemon">
    <button id="clearSearch" class="clear hidden">✕</button>
  </div>
  <button class="add-btn" onclick="openForm()">＋ Add Recipe</button>
</div>

<div class="filters" id="filtersBar"></div>
<div class="count" id="countLabel"></div>
<div class="grid" id="recipeGrid"></div>
<div id="emptyState" class="empty hidden"></div>
<div class="more-wrap"><button id="moreBtn" class="more-btn hidden">Show More Recipes</button></div>
<div id="modal" class="overlay hidden"></div>
<div id="formModal" class="overlay hidden"></div>

<script>
const emojiOptions = ["🍝","🍲","🥗","🌮","🍛","🍕","🥩","🍜","🍔","🍳","🥞","🍱","🥟","🧆","🥙","🌯","🍤","🫕","🍫","🍪","🍰","🍮","🧁","🍦","🥧","🍓","🫐","🍋","🍌","🎂"];

const recipes = [
  { id:1, emoji:"🍝", title:"Creamy Garlic Pasta", time:"25 min", difficulty:"Easy", tags:["vegetarian"], ingredients:["pasta","garlic","cream","parmesan","butter","parsley"], instructions:"Cook pasta al dente. Sauté minced garlic in butter until fragrant. Add cream and simmer 3 minutes. Toss with pasta and parmesan. Garnish with fresh parsley.", custom:false },
  { id:2, emoji:"🥗", title:"Mediterranean Quinoa Bowl", time:"20 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["quinoa","cucumber","tomato","olive oil","lemon","chickpeas","red onion"], instructions:"Cook quinoa and let cool. Dice cucumber, tomato, and red onion. Toss everything with chickpeas, olive oil, and lemon juice. Season with salt and pepper.", custom:false },
  { id:3, emoji:"🌮", title:"Spicy Black Bean Tacos", time:"15 min", difficulty:"Easy", tags:["vegan","dairy-free"], ingredients:["tortillas","black beans","avocado","lime","cilantro","jalapeño","onion"], instructions:"Warm tortillas. Heat black beans with cumin and chili powder. Mash avocado with lime. Assemble tacos with beans, guacamole, diced onion, jalapeño, and cilantro.", custom:false },
  { id:4, emoji:"🍛", title:"Coconut Chickpea Curry", time:"35 min", difficulty:"Medium", tags:["vegan","gluten-free","dairy-free"], ingredients:["chickpeas","coconut milk","tomato","onion","garlic","ginger","curry powder","rice"], instructions:"Sauté onion, garlic, and ginger. Add curry powder and cook 1 min. Add tomatoes, coconut milk, and chickpeas. Simmer 20 min. Serve over rice.", custom:false },
  { id:5, emoji:"🥘", title:"One-Pot Lentil Soup", time:"40 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["lentils","carrot","celery","onion","garlic","cumin","vegetable broth"], instructions:"Sauté diced onion, carrot, and celery. Add garlic and cumin. Pour in broth and lentils. Simmer 30 minutes until lentils are tender. Season to taste.", custom:false },
  { id:6, emoji:"🍕", title:"Margherita Flatbread", time:"20 min", difficulty:"Easy", tags:["vegetarian"], ingredients:["flatbread","mozzarella","tomato","basil","olive oil","garlic"], instructions:"Brush flatbread with olive oil and minced garlic. Top with sliced tomato and mozzarella. Bake at 425°F for 10 min. Add fresh basil leaves before serving.", custom:false },
  { id:7, emoji:"🥩", title:"Herb-Crusted Salmon", time:"25 min", difficulty:"Medium", tags:["gluten-free","dairy-free"], ingredients:["salmon","dill","lemon","garlic","olive oil","asparagus"], instructions:"Mix herbs, garlic, and olive oil. Coat salmon fillets. Bake at 400°F for 15 min with asparagus on the side. Squeeze lemon over before serving.", custom:false },
  { id:8, emoji:"🍜", title:"Veggie Ramen Bowl", time:"30 min", difficulty:"Medium", tags:["vegan","dairy-free"], ingredients:["ramen noodles","mushroom","spinach","soy sauce","ginger","garlic","tofu","green onion"], instructions:"Simmer broth with ginger and garlic. Cook noodles separately. Pan-fry tofu until golden. Assemble bowls with noodles, broth, tofu, mushrooms, spinach, and green onion.", custom:false },
  { id:9, emoji:"🥑", title:"Stuffed Avocado Boats", time:"15 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["avocado","tomato","corn","black beans","lime","cilantro","red onion"], instructions:"Halve avocados and remove pits. Mix corn, black beans, diced tomato, red onion, cilantro, and lime. Fill avocado halves with the mixture.", custom:false },
  { id:10, emoji:"🍗", title:"Lemon Herb Chicken", time:"45 min", difficulty:"Medium", tags:["gluten-free","dairy-free"], ingredients:["chicken thighs","lemon","rosemary","thyme","garlic","olive oil","potato"], instructions:"Marinate chicken in lemon, herbs, garlic, and olive oil. Arrange with potato wedges on a sheet pan. Roast at 425°F for 35 minutes until golden.", custom:false },
  { id:11, emoji:"🥞", title:"Banana Oat Pancakes", time:"15 min", difficulty:"Easy", tags:["vegetarian","gluten-free"], ingredients:["banana","oats","egg","cinnamon","maple syrup","butter"], instructions:"Blend banana, oats, eggs, and cinnamon until smooth. Cook small pancakes on a buttered griddle. Flip when bubbles form. Serve with maple syrup.", custom:false },
  { id:12, emoji:"🍲", title:"Thai Peanut Noodles", time:"20 min", difficulty:"Easy", tags:["vegan","dairy-free"], ingredients:["rice noodles","peanut butter","soy sauce","lime","garlic","carrot","cabbage","peanuts"], instructions:"Cook rice noodles. Whisk peanut butter, soy sauce, lime, and garlic for sauce. Toss noodles with shredded carrot, cabbage, and sauce. Top with crushed peanuts.", custom:false },
  { id:13, emoji:"🧆", title:"Baked Falafel Wrap", time:"35 min", difficulty:"Medium", tags:["vegan","dairy-free"], ingredients:["chickpeas","parsley","garlic","cumin","flour","tortillas","tahini","lettuce","tomato"], instructions:"Blend chickpeas, parsley, garlic, cumin, and flour. Form patties and bake at 375°F for 25 min. Wrap in tortillas with tahini, lettuce, and tomato.", custom:false },
  { id:14, emoji:"🥧", title:"Sweet Potato & Kale Hash", time:"25 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["sweet potato","kale","onion","garlic","olive oil","paprika","cumin"], instructions:"Dice sweet potato and sauté in olive oil until tender. Add onion and garlic. Toss in kale and cook until wilted. Season with paprika and cumin.", custom:false },
  { id:15, emoji:"🍱", title:"Teriyaki Tofu Stir-Fry", time:"25 min", difficulty:"Easy", tags:["vegan","dairy-free"], ingredients:["tofu","soy sauce","rice","broccoli","carrot","sesame oil","ginger","honey"], instructions:"Press and cube tofu, pan-fry until crispy. Stir-fry broccoli and carrots. Make teriyaki glaze with soy sauce, ginger, and honey. Toss everything together, serve over rice.", custom:false },
  { id:16, emoji:"🥟", title:"Veggie Potstickers", time:"40 min", difficulty:"Hard", tags:["vegan","dairy-free"], ingredients:["wonton wrappers","cabbage","carrot","mushroom","ginger","soy sauce","sesame oil","green onion"], instructions:"Finely chop cabbage, carrot, mushroom. Mix with ginger, soy sauce, sesame oil. Fill wrappers and fold. Pan-fry bottoms until golden, add water and steam covered 5 min.", custom:false },
  { id:17, emoji:"🍰", title:"Chia Pudding Parfait", time:"10 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["chia seeds","coconut milk","maple syrup","vanilla","berries","granola"], instructions:"Mix chia seeds with coconut milk, maple syrup, and vanilla. Refrigerate overnight. Layer with fresh berries and granola in a glass.", custom:false },
  { id:18, emoji:"🌯", title:"Grilled Chicken Caesar Wrap", time:"20 min", difficulty:"Easy", tags:[], ingredients:["chicken breast","romaine","parmesan","tortillas","caesar dressing","croutons"], instructions:"Season and grill chicken breast. Slice thin. Lay tortilla with romaine, chicken, parmesan, croutons, and caesar dressing. Roll tightly.", custom:false },
  { id:19, emoji:"🫕", title:"Mushroom Risotto", time:"45 min", difficulty:"Hard", tags:["vegetarian","gluten-free"], ingredients:["arborio rice","mushroom","onion","garlic","white wine","parmesan","butter","vegetable broth"], instructions:"Sauté mushrooms and set aside. Cook onion and garlic, add rice and toast. Deglaze with wine. Ladle in broth gradually, stirring often. Fold in mushrooms, butter, and parmesan.", custom:false },
  { id:20, emoji:"🥙", title:"Greek Salad Pita", time:"10 min", difficulty:"Easy", tags:["vegetarian"], ingredients:["pita bread","cucumber","tomato","feta","olive","red onion","olive oil","oregano"], instructions:"Dice cucumber, tomato, red onion. Toss with olives, feta, olive oil, and oregano. Stuff into warm pita pockets.", custom:false },
  { id:21, emoji:"🍔", title:"Black Bean Burger", time:"25 min", difficulty:"Medium", tags:["vegan","dairy-free"], ingredients:["black beans","breadcrumbs","onion","garlic","cumin","burger buns","lettuce","tomato","avocado"], instructions:"Mash black beans, mix with breadcrumbs, diced onion, garlic, and cumin. Form patties and pan-fry 4 min per side. Serve on buns with lettuce, tomato, and avocado.", custom:false },
  { id:22, emoji:"🍳", title:"Shakshuka", time:"30 min", difficulty:"Medium", tags:["vegetarian","gluten-free","dairy-free"], ingredients:["egg","tomato","onion","bell pepper","garlic","cumin","paprika","cilantro"], instructions:"Sauté onion, bell pepper, and garlic. Add canned tomatoes, cumin, and paprika. Simmer 10 min. Create wells and crack in eggs. Cover and cook until eggs set. Top with cilantro.", custom:false },
  { id:23, emoji:"🥗", title:"Roasted Beet & Goat Cheese Salad", time:"50 min", difficulty:"Medium", tags:["vegetarian","gluten-free"], ingredients:["beets","goat cheese","arugula","walnuts","olive oil","balsamic vinegar","honey"], instructions:"Roast beets at 400°F for 40 min. Cool and slice. Arrange arugula, beet slices, crumbled goat cheese, and walnuts. Drizzle with balsamic-honey vinaigrette.", custom:false },
  { id:24, emoji:"🍤", title:"Garlic Butter Shrimp", time:"15 min", difficulty:"Easy", tags:["gluten-free"], ingredients:["shrimp","butter","garlic","lemon","parsley","red pepper flakes","rice"], instructions:"Melt butter, sauté garlic and red pepper flakes. Add shrimp and cook 2-3 min per side. Squeeze lemon and sprinkle parsley. Serve over rice.", custom:false },
  { id:25, emoji:"🍫", title:"Molten Chocolate Lava Cake", time:"25 min", difficulty:"Medium", tags:["vegetarian"], ingredients:["dark chocolate","butter","egg","sugar","flour","vanilla"], instructions:"Melt chocolate and butter together. Whisk eggs with sugar and vanilla, fold into chocolate mixture. Add flour gently. Pour into greased ramekins and bake at 425°F for 12 min. Center should be gooey.", custom:false },
  { id:26, emoji:"🍓", title:"Strawberry Cheesecake Bites", time:"30 min", difficulty:"Medium", tags:["vegetarian"], ingredients:["cream cheese","strawberries","graham crackers","butter","sugar","vanilla","lemon"], instructions:"Crush graham crackers and mix with melted butter. Press into mini muffin tin. Beat cream cheese with sugar, vanilla, and lemon. Spoon over crusts. Top with sliced strawberries. Chill 2 hours.", custom:false },
  { id:27, emoji:"🍌", title:"Vegan Banana Nice Cream", time:"10 min", difficulty:"Easy", tags:["vegan","gluten-free","dairy-free"], ingredients:["banana","cocoa powder","peanut butter","maple syrup","coconut milk"], instructions:"Freeze ripe bananas overnight. Blend frozen bananas with cocoa powder, peanut butter, a splash of coconut milk, and maple syrup until creamy. Serve immediately or freeze 30 min for firmer texture.", custom:false },
  { id:28, emoji:"🥧", title:"Classic Apple Crumble", time:"45 min", difficulty:"Easy", tags:["vegetarian"], ingredients:["apple","oats","butter","brown sugar","cinnamon","flour","lemon"], instructions:"Slice apples and toss with lemon juice and cinnamon. Place in baking dish. Mix oats, flour, brown sugar, and cold butter into crumbles. Spread over apples. Bake at 375°F for 35 min until golden.", custom:false },
  { id:29, emoji:"🍮", title:"Coconut Panna Cotta", time:"20 min", difficulty:"Medium", tags:["vegan","gluten-free","dairy-free"], ingredients:["coconut milk","agar agar","vanilla","maple syrup","mango","lime"], instructions:"Heat coconut milk with maple syrup and vanilla. Whisk in agar agar and simmer 5 min. Pour into molds and refrigerate 4 hours. Unmold and top with diced mango and lime zest.", custom:false },
  { id:30, emoji:"🍪", title:"Brown Butter Chocolate Chip Cookies", time:"30 min", difficulty:"Easy", tags:["vegetarian"], ingredients:["butter","brown sugar","egg","vanilla","flour","chocolate chips","sea salt"], instructions:"Brown butter in a pan until nutty and golden. Mix with sugars, egg, and vanilla. Fold in flour and chocolate chips. Scoop onto baking sheet. Bake at 375°F for 10 min. Sprinkle with sea salt.", custom:false },
  { id:31, emoji:"🍋", title:"Lemon Bars", time:"50 min", difficulty:"Medium", tags:["vegetarian"], ingredients:["butter","flour","powdered sugar","egg","lemon","sugar"], instructions:"Mix butter, flour, and powdered sugar for crust. Press into pan and bake at 350°F for 15 min. Whisk eggs, sugar, lemon juice, and flour for filling. Pour over crust. Bake 25 min. Cool and dust with powdered sugar.", custom:false },
  { id:32, emoji:"🫐", title:"Blueberry Oat Crisp", time:"40 min", difficulty:"Easy", tags:["vegan","dairy-free"], ingredients:["blueberries","oats","coconut oil","maple syrup","cinnamon","lemon","flour"], instructions:"Toss blueberries with lemon juice and a bit of flour. Spread in baking dish. Mix oats, flour, coconut oil, maple syrup, and cinnamon into crumbles. Top berries and bake at 375°F for 30 min.", custom:false },
  { id:33, emoji:"🍦", title:"Mango Sticky Rice", time:"35 min", difficulty:"Medium", tags:["vegan","gluten-free","dairy-free"], ingredients:["sticky rice","coconut milk","mango","sugar","salt","sesame seeds"], instructions:"Soak sticky rice 30 min, then steam until tender. Warm coconut milk with sugar and salt. Pour half over cooked rice and let absorb. Serve rice with sliced mango, remaining coconut sauce, and sesame seeds.", custom:false },
  { id:34, emoji:"🧁", title:"Tiramisu Cups", time:"25 min", difficulty:"Medium", tags:["vegetarian"], ingredients:["mascarpone","espresso","ladyfingers","cocoa powder","sugar","egg","vanilla"], instructions:"Whisk egg yolks with sugar until thick. Fold in mascarpone and vanilla. Dip ladyfingers briefly in espresso. Layer soaked ladyfingers and cream in cups. Refrigerate 4 hours. Dust with cocoa powder before serving.", custom:false }
];

const filterDefs = [
  { label:"Vegetarian", value:"vegetarian", emoji:"🥬" },
  { label:"Vegan", value:"vegan", emoji:"🌱" },
  { label:"Gluten-Free", value:"gluten-free", emoji:"🌾" },
  { label:"Dairy-Free", value:"dairy-free", emoji:"🥛" }
];
const tagOptions = ["vegetarian","vegan","gluten-free","dairy-free"];
const diffClass = { Easy:"badge-easy", Medium:"badge-medium", Hard:"badge-hard" };

let search = "", activeFilters = [], favorites = new Set(), showFavOnly = false, visible = 8, nextId = 100;

const $ = id => document.getElementById(id);

function heartSVG(filled) {
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="${filled?'#e11d48':'none'}" stroke="${filled?'#e11d48':'#9ca3af'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}

function getFiltered() {
  const terms = search.toLowerCase().split(",").map(s=>s.trim()).filter(Boolean);
  return recipes.filter(r => {
    if (showFavOnly && !favorites.has(r.id)) return false;
    if (activeFilters.length && !activeFilters.every(f => r.tags.includes(f))) return false;
    if (!terms.length) return true;
    return terms.some(t => r.ingredients.some(i => i.includes(t)) || r.title.toLowerCase().includes(t));
  });
}

function renderFilters() {
  const bar = $("filtersBar");
  let html = `<button class="filter-btn fav-hover ${showFavOnly?'active-fav':''}" onclick="toggleFavFilter()">❤️ Favorites${favorites.size?` (${favorites.size})`:''}</button>`;
  html += `<span class="divider"></span>`;
  filterDefs.forEach(f => {
    html += `<button class="filter-btn ${activeFilters.includes(f.value)?'active-diet':''}" onclick="toggleFilter('${f.value}')">${f.emoji} ${f.label}</button>`;
  });
  if (activeFilters.length || showFavOnly) html += `<button class="filter-btn clear-btn" onclick="clearAll()">Clear all</button>`;
  bar.innerHTML = html;
}

function renderGrid() {
  const filtered = getFiltered();
  const shown = filtered.slice(0, visible);
  $("countLabel").textContent = `${filtered.length} recipe${filtered.length!==1?'s':''} found`;
  $("recipeGrid").innerHTML = shown.map((r,i) => `
    <div class="card" style="animation-delay:${i*.05}s">
      <button class="heart-btn" onclick="event.stopPropagation();toggleFav(${r.id})" title="${favorites.has(r.id)?'Remove from favorites':'Add to favorites'}">${heartSVG(favorites.has(r.id))}</button>
      ${r.custom ? `<button class="delete-btn" onclick="event.stopPropagation();deleteRecipe(${r.id})" title="Delete recipe">✕</button>` : ''}
      <div class="card-img" onclick="openModal(${r.id})"><span>${r.emoji}</span></div>
      <div class="card-body" onclick="openModal(${r.id})">
        <h3>${r.title}</h3>
        <div class="card-meta">
          <span class="time">⏱ ${r.time}</span>
          <span class="badge ${diffClass[r.difficulty]}">${r.difficulty}</span>
        </div>
        <div>${r.custom ? '<span class="tag" style="background:#e0e7ff;color:#4338ca">My Recipe</span>' : ''}${r.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');

  const empty = $("emptyState");
  if (!shown.length) {
    empty.classList.remove("hidden");
    empty.innerHTML = `<div class="eicon">${showFavOnly?'❤️':'🍳'}</div><p>${showFavOnly?'No favorites yet.':'No recipes match your search.'}</p><p class="sub">${showFavOnly?'Click the heart on any recipe to save it here.':'Try different ingredients or remove some filters.'}</p>`;
  } else empty.classList.add("hidden");

  const mb = $("moreBtn");
  visible < filtered.length ? mb.classList.remove("hidden") : mb.classList.add("hidden");
}

function openModal(id) {
  const r = recipes.find(x=>x.id===id); if (!r) return;
  const m = $("modal"); m.classList.remove("hidden");
  m.innerHTML = `
    <div class="overlay-bg" onclick="closeModal()"></div>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-img">${r.emoji}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <button class="heart-btn modal-heart" onclick="toggleFav(${r.id});openModal(${r.id})">${heartSVG(favorites.has(r.id))}</button>
      <div class="modal-body">
        <h2>${r.title} ${r.custom?'<span class="tag" style="background:#e0e7ff;color:#4338ca;font-size:.7rem;vertical-align:middle">My Recipe</span>':''}</h2>
        <div class="modal-meta">
          <span style="font-size:.875rem;color:#6b7280">⏱ ${r.time}</span>
          <span class="badge ${diffClass[r.difficulty]}">${r.difficulty}</span>
          ${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="modal-section"><h4>Ingredients</h4><div>${r.ingredients.map(i=>`<span class="ingredient-chip">${i}</span>`).join('')}</div></div>
        <div><h4 style="font-weight:600;color:#374151;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Instructions</h4><p class="instructions">${r.instructions}</p></div>
      </div>
    </div>`;
}
function closeModal() { $("modal").classList.add("hidden"); }

/* ---- Add Recipe Form ---- */
let formEmoji = "🍝", formTags = [];

function openForm() {
  formEmoji = "🍝"; formTags = [];
  const fm = $("formModal"); fm.classList.remove("hidden");
  fm.innerHTML = `
    <div class="overlay-bg" onclick="closeForm()"></div>
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeForm()">✕</button>
      <div class="form-panel">
        <h2>➕ Add Your Recipe</h2>
        <div class="form-group">
          <label>Choose an Emoji</label>
          <div class="emoji-picker">${emojiOptions.map(e=>`<button class="emoji-opt ${e===formEmoji?'selected':''}" onclick="pickEmoji('${e}',this)">${e}</button>`).join('')}</div>
        </div>
        <div class="form-group">
          <label>Recipe Title *</label>
          <input id="fTitle" type="text" placeholder="e.g. Grandma's Tomato Soup">
          <div class="form-error" id="errTitle">Please enter a recipe title.</div>
        </div>
        <div class="form-group">
          <label>Cooking Time *</label>
          <input id="fTime" type="text" placeholder="e.g. 30 min">
          <div class="form-error" id="errTime">Please enter the cooking time.</div>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="fDiff"><option>Easy</option><option>Medium</option><option>Hard</option></select>
        </div>
        <div class="form-group">
          <label>Dietary Tags</label>
          <div class="tag-toggles">${tagOptions.map(t=>`<button class="tag-toggle" onclick="toggleFormTag('${t}',this)">${t}</button>`).join('')}</div>
        </div>
        <div class="form-group">
          <label>Ingredients *</label>
          <input id="fIngr" type="text" placeholder="e.g. tomato, onion, garlic, basil">
          <div class="hint">Comma-separated list</div>
          <div class="form-error" id="errIngr">Please enter at least one ingredient.</div>
        </div>
        <div class="form-group">
          <label>Instructions *</label>
          <textarea id="fInst" placeholder="Describe the cooking steps..."></textarea>
          <div class="form-error" id="errInst">Please enter the instructions.</div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeForm()">Cancel</button>
          <button class="btn-save" onclick="saveRecipe()">Add Recipe</button>
        </div>
      </div>
    </div>`;
}
function closeForm() { $("formModal").classList.add("hidden"); }

function pickEmoji(e, btn) {
  formEmoji = e;
  document.querySelectorAll(".emoji-opt").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function toggleFormTag(t, btn) {
  const i = formTags.indexOf(t);
  i > -1 ? formTags.splice(i,1) : formTags.push(t);
  btn.classList.toggle("on");
}

function saveRecipe() {
  const title = $("fTitle").value.trim();
  const time = $("fTime").value.trim();
  const ingr = $("fIngr").value.trim();
  const inst = $("fInst").value.trim();
  const diff = $("fDiff").value;
  let valid = true;

  [["errTitle",!title],["errTime",!time],["errIngr",!ingr],["errInst",!inst]].forEach(([id,bad])=>{
    $(id).style.display = bad ? "block" : "none";
    if (bad) valid = false;
  });
  if (!valid) return;

  const ingredients = ingr.split(",").map(s=>s.trim().toLowerCase()).filter(Boolean);
  recipes.unshift({ id: nextId++, emoji: formEmoji, title, time, difficulty: diff, tags: [...formTags], ingredients, instructions: inst, custom: true });
  visible = 8;
  closeForm();
  renderGrid();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteRecipe(id) {
  const idx = recipes.findIndex(r => r.id === id);
  if (idx > -1 && recipes[idx].custom) {
    recipes.splice(idx, 1);
    favorites.delete(id);
    renderFilters();
    renderGrid();
  }
}

function toggleFav(id) { favorites.has(id)?favorites.delete(id):favorites.add(id); renderFilters(); renderGrid(); }
function toggleFilter(v) { const i=activeFilters.indexOf(v); i>-1?activeFilters.splice(i,1):activeFilters.push(v); visible=8; renderFilters(); renderGrid(); }
function toggleFavFilter() { showFavOnly=!showFavOnly; visible=8; renderFilters(); renderGrid(); }
function clearAll() { activeFilters=[]; showFavOnly=false; visible=8; renderFilters(); renderGrid(); }

$("searchInput").addEventListener("input", e => { search=e.target.value; visible=8; $("clearSearch").classList.toggle("hidden",!search); renderGrid(); });
$("clearSearch").addEventListener("click", () => { search=""; $("searchInput").value=""; $("clearSearch").classList.add("hidden"); visible=8; renderGrid(); });
$("moreBtn").addEventListener("click", () => { visible+=8; renderGrid(); });
document.addEventListener("keydown", e => { if(e.key==="Escape"){ closeModal(); closeForm(); }});

renderFilters();
renderGrid();
</script>
</body>
</html>
